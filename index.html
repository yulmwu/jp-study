<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>히라가나</title>
        <style>
            body {
                display: flex;
                height: 100vh;
                margin: 0;
            }
            div {
                text-align: center;
            }
            input[type='checkbox'] {
                display: none;
            }
            input[type='checkbox'] + label {
                display: inline-block;
                padding: 10px;
                margin: 10px;
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #fff;
                cursor: pointer;
            }
            input[type='checkbox']:checked + label {
                background-color: #bcffa8;
                color: #000000;
            }
            button {
                padding: 10px 20px;
                font-size: 20px;
                cursor: pointer;
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
                /* button style */
                border: 1px solid #cccccc;
                border-radius: 5px;
                background-color: #fff;
            }

            .container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                width: 100%;
            }

            .footer {
                position: fixed;
                bottom: 0;
                padding: 10px;
                font-size: 15px;
                text-align: left;
            }

            a {
                color: #000000;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }

            input[type='range'] {
                -webkit-appearance: none;
                appearance: none;
                width: 50%;
                height: 8px;
                background: #ddd;
                border-radius: 4px;
                outline: none;
                transition: opacity 0.2s;
            }

            input[type='range']::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 20px;
                height: 20px;
                background-color: #fff;
                border: 2px solid #aaa;
                border-radius: 50%;
                cursor: pointer;
                transition: transform 0.2s;
            }

            input[type='range']::-moz-range-thumb {
                width: 20px;
                height: 20px;
                background-color: #fff;
                border: 2px solid #aaa;
                border-radius: 50%;
                cursor: pointer;
            }

            input[type='range']:hover::-webkit-slider-thumb {
                transform: scale(1.2);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div>
                <h2>퀴즈의 히라가나 행을 선택하세요</h2>
                <input type="checkbox" id="a" />
                <label for="a">a (あ)</label>
                <input type="checkbox" id="ka" />
                <label for="ka">ka (か)</label>
                <input type="checkbox" id="sa" />
                <label for="sa">sa (さ)</label>
                <input type="checkbox" id="ta" />
                <label for="ta">ta (た)</label>
                <input type="checkbox" id="na" />
                <label for="na">na (な)</label>
            </div>
            <div style="margin-top: 20px">
                <button id="selectAll">전체 선택</button>
                <button id="startButton">시작하기</button>
            </div>
            <!-- <div style="margin-top: 150px">
                <h2>옵션 (선택)</h2>
                <p>필요 시에만 선택하세요.</p>
                <input type="checkbox" id="nextnow" />
                <label for="nextnow">정답 후 바로 넘어가기</label>
                <input type="range" id="duplevel" style="margin-top: 20px" min="1" max="4" value="4" />
                <label for="duplevel">중복 </label>
            </div> -->
        </div>

        <div class="footer">
            <p>개발: <a href="https://github.com/yulmwu">김준영</a></p>
            <p>데이터 제공: 윤선우</p>
        </div>

        <script>
            const checkboxes = document.querySelectorAll('input[type="checkbox"]')
            const selectAll = document.getElementById('selectAll')

            document.getElementById('startButton').addEventListener('click', () => {
                let selected_hiragana = []

                checkboxes.forEach((checkbox) => {
                    if (checkbox.checked) selected_hiragana.push(checkbox.id)
                })

                if (selected_hiragana.length === 0) {
                    alert('최소 하나 이상의 히라가나 행을 선택하세요')
                    return
                }

                const url = new URL('main.html', window.location.href)
                url.searchParams.append('r', selected_hiragana.join(','))
                window.location.href = url.href
            })

            selectAll.addEventListener('click', () => {
                if (selectAll.innerHTML === '전체 선택') {
                    selectAll.innerHTML = '전체 해제'
                    checkboxes.forEach((checkbox) => {
                        checkbox.checked = true
                    })
                } else {
                    selectAll.innerHTML = '전체 선택'
                    checkboxes.forEach((checkbox) => {
                        checkbox.checked = false
                    })
                }
            })
        </script>
    </body>
</html>

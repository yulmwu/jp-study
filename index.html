<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>히라가나 퀴즈</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                text-align: center;
            }
            .quiz-container {
                margin-top: 50px;
            }
            .options {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-top: 20px;
            }
            .options button {
                padding: 10px 20px;
                font-size: 20px;
                cursor: pointer;
                /* button style */
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #fff;
            }
            .next {
                margin-top: 20px;
                padding: 10px 20px;
                font-size: 20px;
                cursor: pointer;
                /* button style */
                border: 1px solid #ccc;
                border-radius: 5px;
                background-color: #fff;
            }
        </style>
    </head>
    <body>
        <div class="quiz-container">
            <h1 id="question">?</h1>
            <div class="options" id="options"></div>
            <p id="result"></p>
            <button class="next" id="skipButton">건너뛰기</button>
        </div>

        <script src="index.js"></script>
    </body>
</html>
